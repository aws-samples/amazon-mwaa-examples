AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: MCP Server for MWAA Serverless DAG Factory YAML generation

Globals:
  Function:
    Timeout: 29
    Runtime: python3.12
    MemorySize: 512

Resources:
  McpFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.handler
      CodeUri: src/
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - airflow-serverless:ListWorkflows
                - airflow-serverless:GetWorkflow
                - airflow-serverless:CreateWorkflow
                - airflow-serverless:UpdateWorkflow
                - airflow-serverless:DeleteWorkflow
                - airflow-serverless:StartWorkflowRun
                - airflow-serverless:GetWorkflowRun
                - airflow-serverless:ListWorkflowRuns
                - airflow-serverless:ListWorkflowVersions
                - airflow-serverless:StopWorkflowRun
              Resource: "*"
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
              Resource: "*"
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
            - Effect: Allow
              Action:
                - logs:DescribeLogGroups
                - logs:DescribeLogStreams
                - logs:GetLogEvents
              Resource: "*"
            - Effect: Allow
              Action:
                - iam:PassRole
              Resource: "*"
              Condition:
                StringEquals:
                  iam:PassedToService: airflow-serverless.amazonaws.com
      Events:
        McpApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref McpHttpApi
            Path: /mcp
            Method: POST
        McpApiGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref McpHttpApi
            Path: /mcp
            Method: GET
        McpApiDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref McpHttpApi
            Path: /mcp
            Method: DELETE
      Environment:
        Variables:
          LOG_LEVEL: INFO

  McpHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - DELETE
          - OPTIONS
        AllowHeaders:
          - '*'

Outputs:
  McpApiUrl:
    Description: MCP Server API Gateway URL
    Value: !Sub "https://${McpHttpApi}.execute-api.${AWS::Region}.amazonaws.com/mcp"
  McpFunctionArn:
    Description: MCP Server Function ARN
    Value: !GetAtt McpFunction.Arn
