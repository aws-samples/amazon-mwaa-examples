step_functions_dag:
  schedule: None
  tasks:
    create_sfn_stack:
      task_id: create_sfn_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationCreateStackOperator
      stack_name: '{{ params.stack_name }}'
      cloudformation_parameters:
        StackName: '{{ params.stack_name }}'
        Capabilities:
        - CAPABILITY_IAM
        TemplateBody: "AWSTemplateFormatVersion: '2010-09-09'\nParameters:\n  StateMachineName:\n\
          \    Type: String\n    Default: mwaa-test-sfn\nResources:\n  SfnRole:\n\
          \    Type: AWS::IAM::Role\n    Properties:\n      AssumeRolePolicyDocument:\n\
          \        Version: '2012-10-17'\n        Statement:\n          - Effect:\
          \ Allow\n            Principal:\n              Service: states.amazonaws.com\n\
          \            Action: sts:AssumeRole\n  TestStateMachine:\n    Type: AWS::StepFunctions::StateMachine\n\
          \    Properties:\n      StateMachineName: !Ref StateMachineName\n      RoleArn:\
          \ !GetAtt SfnRole.Arn\n      DefinitionString: |\n        {\"Comment\":\
          \ \"Test\", \"StartAt\": \"Pass\", \"States\": {\"Pass\": {\"Type\": \"\
          Pass\", \"Result\": \"Hello from MWAA\", \"End\": true}}}\nOutputs:\n  StateMachineArn:\n\
          \    Value: !Ref TestStateMachine\n"
        Parameters:
        - ParameterKey: StateMachineName
          ParameterValue: '{{ params.state_machine_name }}'
    wait_for_sfn_stack:
      task_id: wait_for_sfn_stack
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationCreateStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - create_sfn_stack
    start_execution:
      task_id: start_execution
      operator: airflow.providers.amazon.aws.operators.step_function.StepFunctionStartExecutionOperator
      state_machine_arn: '{{ ti.xcom_pull(task_ids=''create_sfn_stack'')[''CreateStackResponse''][''Outputs''][0][''OutputValue'']
        }}'
      state_machine_input: '{"key": "value"}'
      dependencies:
      - wait_for_sfn_stack
    wait_for_execution:
      task_id: wait_for_execution
      operator: airflow.providers.amazon.aws.sensors.step_function.StepFunctionExecutionSensor
      execution_arn: '{{ ti.xcom_pull(task_ids=''start_execution'') }}'
      dependencies:
      - start_execution
    delete_sfn_stack:
      task_id: delete_sfn_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationDeleteStackOperator
      trigger_rule: all_done
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - wait_for_execution
    wait_for_sfn_delete:
      task_id: wait_for_sfn_delete
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationDeleteStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - delete_sfn_stack
  description: MWAA Serverless Step Functions example DAG
  params:
    state_machine_name: mwaa-test-sfn
    stack_name: mwaa-test-sfn-stack
