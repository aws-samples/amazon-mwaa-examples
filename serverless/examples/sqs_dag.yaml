sqs_dag:
  schedule: None
  tasks:
    create_sqs_stack:
      task_id: create_sqs_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationCreateStackOperator
      stack_name: '{{ params.stack_name }}'
      cloudformation_parameters:
        StackName: '{{ params.stack_name }}'
        TemplateBody: "AWSTemplateFormatVersion: '2010-09-09'\nParameters:\n  QueueName:\n\
          \    Type: String\n    Default: mwaa-test-sqs-queue\nResources:\n  TestQueue:\n\
          \    Type: AWS::SQS::Queue\n    Properties:\n      QueueName: !Ref QueueName\n\
          Outputs:\n  QueueUrl:\n    Value: !Ref TestQueue\n"
        Parameters:
        - ParameterKey: QueueName
          ParameterValue: '{{ params.queue_name }}'
    wait_for_sqs_stack:
      task_id: wait_for_sqs_stack
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationCreateStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - create_sqs_stack
    publish_message:
      task_id: publish_message
      operator: airflow.providers.amazon.aws.operators.sqs.SqsPublishOperator
      sqs_queue: '{{ ti.xcom_pull(task_ids=''create_sqs_stack'')[''CreateStackResponse''][''Outputs''][0][''OutputValue'']
        }}'
      message_content: '{"event": "workflow_started"}'
      dependencies:
      - wait_for_sqs_stack
    wait_for_message:
      task_id: wait_for_message
      operator: airflow.providers.amazon.aws.sensors.sqs.SqsSensor
      sqs_queue: '{{ ti.xcom_pull(task_ids=''create_sqs_stack'')[''CreateStackResponse''][''Outputs''][0][''OutputValue'']
        }}'
      dependencies:
      - publish_message
    delete_sqs_stack:
      task_id: delete_sqs_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationDeleteStackOperator
      trigger_rule: all_done
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - wait_for_message
    wait_for_sqs_delete:
      task_id: wait_for_sqs_delete
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationDeleteStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - delete_sqs_stack
  description: MWAA Serverless Sqs example DAG
  params:
    queue_name: mwaa-test-sqs-queue
    stack_name: mwaa-test-sqs-stack
