sagemaker_dag:
  schedule: None
  tasks:
    create_sagemaker_stack:
      task_id: create_sagemaker_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationCreateStackOperator
      stack_name: '{{ params.stack_name }}'
      cloudformation_parameters:
        StackName: '{{ params.stack_name }}'
        Capabilities:
        - CAPABILITY_IAM
        TemplateBody: "AWSTemplateFormatVersion: '2010-09-09'\nResources:\n  SageMakerRole:\n\
          \    Type: AWS::IAM::Role\n    Properties:\n      AssumeRolePolicyDocument:\n\
          \        Version: '2012-10-17'\n        Statement:\n          - Effect:\
          \ Allow\n            Principal:\n              Service: sagemaker.amazonaws.com\n\
          \            Action: sts:AssumeRole\n      ManagedPolicyArns:\n        -\
          \ arn:aws:iam::aws:policy/AmazonSageMakerFullAccess\nOutputs:\n  RoleArn:\n\
          \    Value: !GetAtt SageMakerRole.Arn\n"
    wait_for_sagemaker_stack:
      task_id: wait_for_sagemaker_stack
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationCreateStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - create_sagemaker_stack
    start_processing:
      task_id: start_processing
      operator: airflow.providers.amazon.aws.operators.sagemaker.SageMakerProcessingOperator
      config:
        ProcessingJobName: processing-job-{{ ds_nodash }}
        RoleArn: '{{ ti.xcom_pull(task_ids=''create_sagemaker_stack'')[''CreateStackResponse''][''Outputs''][0][''OutputValue'']
          }}'
        ProcessingResources:
          ClusterConfig:
            InstanceCount: 1
            InstanceType: '{{ params.instance_type }}'
            VolumeSizeInGB: 10
        AppSpecification:
          ImageUri: '{{ params.image_uri }}'
      wait_for_completion: true
      dependencies:
      - wait_for_sagemaker_stack
    delete_sagemaker_stack:
      task_id: delete_sagemaker_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationDeleteStackOperator
      trigger_rule: all_done
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - start_processing
    wait_for_sagemaker_delete:
      task_id: wait_for_sagemaker_delete
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationDeleteStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - delete_sagemaker_stack
  description: MWAA Serverless Sagemaker example DAG
  params:
    instance_type: ml.m5.large
    stack_name: mwaa-test-sagemaker-stack
    image_uri: 683313688378.dkr.ecr.us-east-1.amazonaws.com/sagemaker-scikit-learn:1.2-1-cpu-py3
