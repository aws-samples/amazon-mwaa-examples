eks_dag:
  schedule: None
  tasks:
    create_eks_stack:
      task_id: create_eks_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationCreateStackOperator
      stack_name: '{{ params.stack_name }}'
      cloudformation_parameters:
        StackName: '{{ params.stack_name }}'
        Capabilities:
        - CAPABILITY_IAM
        TemplateBody: "AWSTemplateFormatVersion: '2010-09-09'\nResources:\n  VPC:\n\
          \    Type: AWS::EC2::VPC\n    Properties:\n      CidrBlock: 10.0.0.0/16\n\
          \      EnableDnsSupport: true\n      EnableDnsHostnames: true\n  SubnetA:\n\
          \    Type: AWS::EC2::Subnet\n    Properties:\n      VpcId: !Ref VPC\n  \
          \    CidrBlock: 10.0.1.0/24\n      AvailabilityZone: !Select [0, !GetAZs\
          \ '']\n  SubnetB:\n    Type: AWS::EC2::Subnet\n    Properties:\n      VpcId:\
          \ !Ref VPC\n      CidrBlock: 10.0.2.0/24\n      AvailabilityZone: !Select\
          \ [1, !GetAZs '']\n  EksRole:\n    Type: AWS::IAM::Role\n    Properties:\n\
          \      AssumeRolePolicyDocument:\n        Version: '2012-10-17'\n      \
          \  Statement:\n          - Effect: Allow\n            Principal:\n     \
          \         Service: eks.amazonaws.com\n            Action: sts:AssumeRole\n\
          \      ManagedPolicyArns:\n        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy\n\
          Outputs:\n  RoleArn:\n    Value: !GetAtt EksRole.Arn\n  SubnetAId:\n   \
          \ Value: !Ref SubnetA\n  SubnetBId:\n    Value: !Ref SubnetB\n  SecurityGroupId:\n\
          \    Value: !GetAtt VPC.DefaultSecurityGroup\n"
    wait_for_eks_stack:
      task_id: wait_for_eks_stack
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationCreateStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - create_eks_stack
    create_cluster:
      task_id: create_cluster
      operator: airflow.providers.amazon.aws.operators.eks.EksCreateClusterOperator
      cluster_name: '{{ params.cluster_name }}'
      cluster_role_arn: '{{ ti.xcom_pull(task_ids=''create_eks_stack'')[''CreateStackResponse''][''Outputs''][0][''OutputValue'']
        }}'
      resources_vpc_config:
        subnetIds:
        - '{{ ti.xcom_pull(task_ids=''create_eks_stack'')[''CreateStackResponse''][''Outputs''][1][''OutputValue'']
          }}'
        - '{{ ti.xcom_pull(task_ids=''create_eks_stack'')[''CreateStackResponse''][''Outputs''][2][''OutputValue'']
          }}'
        securityGroupIds:
        - '{{ ti.xcom_pull(task_ids=''create_eks_stack'')[''CreateStackResponse''][''Outputs''][3][''OutputValue'']
          }}'
      dependencies:
      - wait_for_eks_stack
    wait_for_cluster:
      task_id: wait_for_cluster
      operator: airflow.providers.amazon.aws.sensors.eks.EksClusterStateSensor
      cluster_name: '{{ params.cluster_name }}'
      target_state: ACTIVE
      dependencies:
      - create_cluster
    delete_cluster:
      task_id: delete_cluster
      operator: airflow.providers.amazon.aws.operators.eks.EksDeleteClusterOperator
      trigger_rule: all_done
      cluster_name: '{{ params.cluster_name }}'
      dependencies:
      - wait_for_cluster
    delete_eks_stack:
      task_id: delete_eks_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationDeleteStackOperator
      trigger_rule: all_done
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - delete_cluster
    wait_for_eks_delete:
      task_id: wait_for_eks_delete
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationDeleteStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - delete_eks_stack
  description: MWAA Serverless Eks example DAG
  params:
    cluster_name: mwaa-test-eks
    stack_name: mwaa-test-eks-stack
