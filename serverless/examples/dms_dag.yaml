dms_dag:
  schedule: None
  tasks:
    create_dms_stack:
      task_id: create_dms_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationCreateStackOperator
      stack_name: '{{ params.stack_name }}'
      cloudformation_parameters:
        StackName: '{{ params.stack_name }}'
        Capabilities:
        - CAPABILITY_IAM
        TemplateBody: "AWSTemplateFormatVersion: '2010-09-09'\nDescription: DMS replication\
          \ instance for testing\nResources:\n  DmsRole:\n    Type: AWS::IAM::Role\n\
          \    Properties:\n      RoleName: dms-vpc-role\n      AssumeRolePolicyDocument:\n\
          \        Version: '2012-10-17'\n        Statement:\n          - Effect:\
          \ Allow\n            Principal:\n              Service: dms.amazonaws.com\n\
          \            Action: sts:AssumeRole\n      ManagedPolicyArns:\n        -\
          \ arn:aws:iam::aws:policy/service-role/AmazonDMSVPCManagementRole\n  ReplicationInstance:\n\
          \    Type: AWS::DMS::ReplicationInstance\n    DependsOn: DmsRole\n    Properties:\n\
          \      ReplicationInstanceClass: dms.t3.micro\n      ReplicationInstanceIdentifier:\
          \ mwaa-test-dms-ri\n      PubliclyAccessible: false\nOutputs:\n  ReplicationInstanceArn:\n\
          \    Value: !Ref ReplicationInstance\n"
    wait_for_dms_stack:
      task_id: wait_for_dms_stack
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationCreateStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - create_dms_stack
    delete_dms_stack:
      task_id: delete_dms_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationDeleteStackOperator
      trigger_rule: all_done
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - wait_for_dms_stack
    wait_for_dms_delete:
      task_id: wait_for_dms_delete
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationDeleteStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - delete_dms_stack
  description: MWAA Serverless Dms example DAG
  params:
    stack_name: mwaa-test-dms-stack
