appflow_dag:
  schedule: None
  tasks:
    create_appflow_stack:
      task_id: create_appflow_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationCreateStackOperator
      stack_name: '{{ params.stack_name }}'
      cloudformation_parameters:
        StackName: '{{ params.stack_name }}'
        TemplateBody: "AWSTemplateFormatVersion: '2010-09-09'\nResources:\n  SourceBucket:\n\
          \    Type: AWS::S3::Bucket\n  DestBucket:\n    Type: AWS::S3::Bucket\n \
          \ TestFlow:\n    Type: AWS::AppFlow::Flow\n    Properties:\n      FlowName:\
          \ mwaa-test-flow\n      TriggerConfig:\n        TriggerType: OnDemand\n\
          \      SourceFlowConfig:\n        ConnectorType: S3\n        SourceConnectorProperties:\n\
          \          S3:\n            BucketName: !Ref SourceBucket\n            BucketPrefix:\
          \ input\n      DestinationFlowConfigList:\n        - ConnectorType: S3\n\
          \          DestinationConnectorProperties:\n            S3:\n          \
          \    BucketName: !Ref DestBucket\n              BucketPrefix: output\n \
          \     Tasks:\n        - TaskType: Map_all\n          SourceFields: []\n\
          \          TaskProperties:\n            - Key: EXCLUDE_SOURCE_FIELDS_LIST\n\
          \              Value: '[]'\nOutputs:\n  FlowName:\n    Value: mwaa-test-flow\n"
    wait_for_appflow_stack:
      task_id: wait_for_appflow_stack
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationCreateStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - create_appflow_stack
    run_flow:
      task_id: run_flow
      operator: airflow.providers.amazon.aws.operators.appflow.AppflowRunOperator
      flow_name: mwaa-test-flow
      wait_for_completion: true
      dependencies:
      - wait_for_appflow_stack
    delete_appflow_stack:
      task_id: delete_appflow_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationDeleteStackOperator
      trigger_rule: all_done
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - run_flow
    wait_for_appflow_delete:
      task_id: wait_for_appflow_delete
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationDeleteStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - delete_appflow_stack
  description: MWAA Serverless Appflow example DAG
  params:
    stack_name: mwaa-test-appflow-stack
