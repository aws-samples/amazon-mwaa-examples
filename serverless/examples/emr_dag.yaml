emr_dag:
  schedule: None
  tasks:
    create_emr_stack:
      task_id: create_emr_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationCreateStackOperator
      stack_name: '{{ params.stack_name }}'
      cloudformation_parameters:
        StackName: '{{ params.stack_name }}'
        Capabilities:
        - CAPABILITY_IAM
        TemplateBody: "AWSTemplateFormatVersion: '2010-09-09'\nResources:\n  LogBucket:\n\
          \    Type: AWS::S3::Bucket\n  EmrServiceRole:\n    Type: AWS::IAM::Role\n\
          \    Properties:\n      AssumeRolePolicyDocument:\n        Version: '2012-10-17'\n\
          \        Statement:\n          - Effect: Allow\n            Principal:\n\
          \              Service: elasticmapreduce.amazonaws.com\n            Action:\
          \ sts:AssumeRole\n      ManagedPolicyArns:\n        - arn:aws:iam::aws:policy/service-role/AmazonEMRServicePolicy_v2\n\
          \  EmrEc2Role:\n    Type: AWS::IAM::Role\n    Properties:\n      AssumeRolePolicyDocument:\n\
          \        Version: '2012-10-17'\n        Statement:\n          - Effect:\
          \ Allow\n            Principal:\n              Service: ec2.amazonaws.com\n\
          \            Action: sts:AssumeRole\n      ManagedPolicyArns:\n        -\
          \ arn:aws:iam::aws:policy/service-role/AmazonElasticMapReduceforEC2Role\n\
          \  EmrInstanceProfile:\n    Type: AWS::IAM::InstanceProfile\n    Properties:\n\
          \      Roles:\n        - !Ref EmrEc2Role\nOutputs:\n  LogBucketUri:\n  \
          \  Value: !Sub 's3://${LogBucket}/emr-logs/'\n  ServiceRoleName:\n    Value:\
          \ !Ref EmrServiceRole\n  InstanceProfileName:\n    Value: !Ref EmrInstanceProfile\n"
    wait_for_emr_stack:
      task_id: wait_for_emr_stack
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationCreateStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - create_emr_stack
    create_job_flow:
      task_id: create_job_flow
      operator: airflow.providers.amazon.aws.operators.emr.EmrCreateJobFlowOperator
      emr_conn_id: aws_default
      job_flow_overrides:
        Name: emr-cluster-{{ ds_nodash }}
        LogUri: '{{ ti.xcom_pull(task_ids=''create_emr_stack'')[''CreateStackResponse''][''Outputs''][0][''OutputValue'']
          }}'
        ReleaseLabel: emr-7.0.0
        ServiceRole: '{{ ti.xcom_pull(task_ids=''create_emr_stack'')[''CreateStackResponse''][''Outputs''][1][''OutputValue'']
          }}'
        JobFlowRole: '{{ ti.xcom_pull(task_ids=''create_emr_stack'')[''CreateStackResponse''][''Outputs''][2][''OutputValue'']
          }}'
        Instances:
          InstanceGroups:
          - Name: Primary
            Market: ON_DEMAND
            InstanceRole: MASTER
            InstanceType: m5.xlarge
            InstanceCount: 1
          KeepJobFlowAliveWhenNoSteps: false
          TerminationProtected: false
      dependencies:
      - wait_for_emr_stack
    wait_for_job_flow:
      task_id: wait_for_job_flow
      operator: airflow.providers.amazon.aws.sensors.emr.EmrJobFlowSensor
      job_flow_id: '{{ ti.xcom_pull(task_ids=''create_job_flow'') }}'
      target_states:
      - TERMINATED
      dependencies:
      - create_job_flow
    delete_emr_stack:
      task_id: delete_emr_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationDeleteStackOperator
      trigger_rule: all_done
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - wait_for_job_flow
    wait_for_emr_delete:
      task_id: wait_for_emr_delete
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationDeleteStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - delete_emr_stack
  description: MWAA Serverless Emr example DAG
  params:
    log_uri: s3://amzn-s3-demo-bucket/emr-logs/
    stack_name: mwaa-test-emr-stack
