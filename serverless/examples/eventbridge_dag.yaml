eventbridge_dag:
  schedule: None
  tasks:
    create_eb_stack:
      task_id: create_eb_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationCreateStackOperator
      stack_name: '{{ params.stack_name }}'
      cloudformation_parameters:
        StackName: '{{ params.stack_name }}'
        TemplateBody: "AWSTemplateFormatVersion: '2010-09-09'\nResources:\n  TestEventBus:\n\
          \    Type: AWS::Events::EventBus\n    Properties:\n      Name: mwaa-test-event-bus\n\
          \  TestRule:\n    Type: AWS::Events::Rule\n    Properties:\n      Name:\
          \ mwaa-test-eb-rule\n      EventBusName: !Ref TestEventBus\n      EventPattern:\n\
          \        source:\n          - mwaa.serverless\n      State: ENABLED\nOutputs:\n\
          \  EventBusName:\n    Value: !Ref TestEventBus\n"
    wait_for_eb_stack:
      task_id: wait_for_eb_stack
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationCreateStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - create_eb_stack
    put_events:
      task_id: put_events
      operator: airflow.providers.amazon.aws.operators.eventbridge.EventBridgePutEventsOperator
      entries:
      - Source: mwaa.serverless
        DetailType: WorkflowEvent
        Detail: '{"status": "started"}'
        EventBusName: mwaa-test-event-bus
      dependencies:
      - wait_for_eb_stack
    disable_rule:
      task_id: disable_rule
      operator: airflow.providers.amazon.aws.operators.eventbridge.EventBridgeDisableRuleOperator
      trigger_rule: all_done
      name: mwaa-test-eb-rule
      event_bus_name: mwaa-test-event-bus
      dependencies:
      - put_events
    delete_eb_stack:
      task_id: delete_eb_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationDeleteStackOperator
      trigger_rule: all_done
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - disable_rule
    wait_for_eb_delete:
      task_id: wait_for_eb_delete
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationDeleteStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - delete_eb_stack
  description: MWAA Serverless Eventbridge example DAG
  params:
    stack_name: mwaa-test-eb-stack
