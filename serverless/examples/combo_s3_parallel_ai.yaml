combo_s3_parallel_ai:
  schedule: None
  tasks:
    s3_create_test_bucket:
      operator: airflow.providers.amazon.aws.operators.s3.S3CreateBucketOperator
      bucket_name: test-bucket-{{ ds_nodash }}
      task_id: s3_create_test_bucket
    s3_create_test_object:
      operator: airflow.providers.amazon.aws.operators.s3.S3CreateObjectOperator
      data: Hello World
      s3_bucket: test-bucket-{{ ds_nodash }}
      s3_key: test-file.txt
      task_id: s3_create_test_object
      replace: true
      dependencies:
      - s3_create_test_bucket
    s3_wait_for_key:
      operator: airflow.providers.amazon.aws.sensors.s3.S3KeySensor
      bucket_key: test-file.txt
      bucket_name: test-bucket-{{ ds_nodash }}
      task_id: s3_wait_for_key
      use_regex: false
      wildcard_match: false
      dependencies:
      - s3_create_test_object
    s3_list_objects:
      operator: airflow.providers.amazon.aws.operators.s3.S3ListOperator
      apply_wildcard: false
      bucket: test-bucket-{{ ds_nodash }}
      delimiter: ''
      task_id: s3_list_objects
      dependencies:
      - s3_wait_for_key
    s3_delete_objects:
      operator: airflow.providers.amazon.aws.operators.s3.S3DeleteObjectsOperator
      bucket: test-bucket-{{ ds_nodash }}
      keys:
      - test-file.txt
      task_id: s3_delete_objects
      dependencies:
      - s3_list_objects
    s3_delete_test_bucket:
      operator: airflow.providers.amazon.aws.operators.s3.S3DeleteBucketOperator
      aws_conn_id: aws_default
      bucket_name: test-bucket-{{ ds_nodash }}
      force_delete: true
      task_id: s3_delete_test_bucket
      trigger_rule: all_done
      dependencies:
      - s3_delete_objects
    br_invoke_model:
      task_id: br_invoke_model
      operator: airflow.providers.amazon.aws.operators.bedrock.BedrockInvokeModelOperator
      model_id: '{{ params.br_model_id }}'
      input_data:
        messages:
        - role: user
          content:
          - text: What is Amazon MWAA?
      dependencies:
      - s3_delete_objects
    comp_create_comprehend_stack:
      task_id: comp_create_comprehend_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationCreateStackOperator
      stack_name: '{{ params.comp_stack_name }}'
      cloudformation_parameters:
        StackName: '{{ params.comp_stack_name }}'
        Capabilities:
        - CAPABILITY_IAM
        TemplateBody: "AWSTemplateFormatVersion: '2010-09-09'\nResources:\n  DataBucket:\n\
          \    Type: AWS::S3::Bucket\n  ComprehendRole:\n    Type: AWS::IAM::Role\n\
          \    Properties:\n      AssumeRolePolicyDocument:\n        Version: '2012-10-17'\n\
          \        Statement:\n          - Effect: Allow\n            Principal:\n\
          \              Service: comprehend.amazonaws.com\n            Action: sts:AssumeRole\n\
          \      Policies:\n        - PolicyName: S3Access\n          PolicyDocument:\n\
          \            Version: '2012-10-17'\n            Statement:\n           \
          \   - Effect: Allow\n                Action: s3:*\n                Resource:\n\
          \                  - !GetAtt DataBucket.Arn\n                  - !Sub '${DataBucket.Arn}/*'\n\
          Outputs:\n  InputS3Uri:\n    Value: !Sub 's3://${DataBucket}/input/'\n \
          \ OutputS3Uri:\n    Value: !Sub 's3://${DataBucket}/output/'\n  BucketName:\n\
          \    Value: !Ref DataBucket\n  RoleArn:\n    Value: !GetAtt ComprehendRole.Arn\n"
      dependencies:
      - s3_delete_objects
    comp_wait_for_comprehend_stack:
      task_id: comp_wait_for_comprehend_stack
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationCreateStackSensor
      stack_name: '{{ params.comp_stack_name }}'
      dependencies:
      - comp_create_comprehend_stack
    comp_upload_test_data:
      task_id: comp_upload_test_data
      operator: airflow.providers.amazon.aws.operators.s3.S3CreateObjectOperator
      s3_bucket: '{{ ti.xcom_pull(task_ids=''create_comprehend_stack'')[''CreateStackResponse''][''Outputs''][2][''OutputValue'']
        }}'
      s3_key: input/test.txt
      data: John Smith lives at 123 Main St and his email is test@example.com
      replace: true
      dependencies:
      - comp_wait_for_comprehend_stack
    comp_start_pii_detection:
      task_id: comp_start_pii_detection
      operator: airflow.providers.amazon.aws.operators.comprehend.ComprehendStartPiiEntitiesDetectionJobOperator
      input_data_config:
        S3Uri: '{{ ti.xcom_pull(task_ids=''create_comprehend_stack'')[''CreateStackResponse''][''Outputs''][0][''OutputValue'']
          }}'
        InputFormat: ONE_DOC_PER_LINE
      output_data_config:
        S3Uri: '{{ ti.xcom_pull(task_ids=''create_comprehend_stack'')[''CreateStackResponse''][''Outputs''][1][''OutputValue'']
          }}'
      mode: ONLY_REDACTION
      data_access_role_arn: '{{ ti.xcom_pull(task_ids=''create_comprehend_stack'')[''CreateStackResponse''][''Outputs''][3][''OutputValue'']
        }}'
      language_code: en
      dependencies:
      - comp_upload_test_data
    comp_wait_for_pii_detection:
      task_id: comp_wait_for_pii_detection
      operator: airflow.providers.amazon.aws.sensors.comprehend.ComprehendStartPiiEntitiesDetectionJobCompletedSensor
      job_id: '{{ ti.xcom_pull(task_ids=''start_pii_detection'') }}'
      dependencies:
      - comp_start_pii_detection
    comp_delete_comprehend_stack:
      task_id: comp_delete_comprehend_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationDeleteStackOperator
      trigger_rule: all_done
      stack_name: '{{ params.comp_stack_name }}'
      dependencies:
      - comp_wait_for_pii_detection
    comp_wait_for_comprehend_delete:
      task_id: comp_wait_for_comprehend_delete
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationDeleteStackSensor
      stack_name: '{{ params.comp_stack_name }}'
      dependencies:
      - comp_delete_comprehend_stack
  description: 'S3 then parallel Bedrock + Comprehend: store data then run AI tasks
    in parallel'
  params:
    br_model_id: amazon.nova-lite-v1:0
    comp_stack_name: mwaa-test-comprehend-stack
