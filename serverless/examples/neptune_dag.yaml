neptune_dag:
  schedule: None
  tasks:
    create_neptune_stack:
      task_id: create_neptune_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationCreateStackOperator
      stack_name: '{{ params.stack_name }}'
      cloudformation_parameters:
        StackName: '{{ params.stack_name }}'
        TemplateBody: "AWSTemplateFormatVersion: '2010-09-09'\nResources:\n  NeptuneCluster:\n\
          \    Type: AWS::Neptune::DBCluster\n    Properties:\n      DBClusterIdentifier:\
          \ mwaa-test-neptune\n      EngineVersion: 1.3.2.1\n      DeletionProtection:\
          \ false\n  NeptuneInstance:\n    Type: AWS::Neptune::DBInstance\n    Properties:\n\
          \      DBClusterIdentifier: !Ref NeptuneCluster\n      DBInstanceClass:\
          \ db.t3.medium\nOutputs:\n  ClusterId:\n    Value: !Ref NeptuneCluster\n"
    wait_for_neptune_stack:
      task_id: wait_for_neptune_stack
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationCreateStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - create_neptune_stack
    stop_cluster:
      task_id: stop_cluster
      operator: airflow.providers.amazon.aws.operators.neptune.NeptuneStopDbClusterOperator
      db_cluster_id: mwaa-test-neptune
      dependencies:
      - wait_for_neptune_stack
    start_cluster:
      task_id: start_cluster
      operator: airflow.providers.amazon.aws.operators.neptune.NeptuneStartDbClusterOperator
      db_cluster_id: mwaa-test-neptune
      dependencies:
      - stop_cluster
    delete_neptune_stack:
      task_id: delete_neptune_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationDeleteStackOperator
      trigger_rule: all_done
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - start_cluster
    wait_for_neptune_delete:
      task_id: wait_for_neptune_delete
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationDeleteStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - delete_neptune_stack
  description: MWAA Serverless Neptune example DAG
  params:
    stack_name: mwaa-test-neptune-stack
