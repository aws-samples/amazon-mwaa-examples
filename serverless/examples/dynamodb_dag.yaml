dynamodb_dag:
  schedule: None
  tasks:
    create_dynamodb_stack:
      task_id: create_dynamodb_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationCreateStackOperator
      stack_name: '{{ params.stack_name }}'
      cloudformation_parameters:
        StackName: '{{ params.stack_name }}'
        TemplateBody: "AWSTemplateFormatVersion: '2010-09-09'\nResources:\n  TestTable:\n\
          \    Type: AWS::DynamoDB::Table\n    Properties:\n      TableName: mwaa-test-table\n\
          \      BillingMode: PAY_PER_REQUEST\n      AttributeDefinitions:\n     \
          \   - AttributeName: pk\n          AttributeType: S\n      KeySchema:\n\
          \        - AttributeName: pk\n          KeyType: HASH\nOutputs:\n  TableName:\n\
          \    Value: !Ref TestTable\n"
    wait_for_dynamodb_stack:
      task_id: wait_for_dynamodb_stack
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationCreateStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - create_dynamodb_stack
    wait_for_value:
      task_id: wait_for_value
      operator: airflow.providers.amazon.aws.sensors.dynamodb.DynamoDBValueSensor
      table_name: mwaa-test-table
      partition_key_name: pk
      partition_key_value: test-key
      attribute_name: status
      attribute_value:
      - complete
      dependencies:
      - wait_for_dynamodb_stack
    delete_dynamodb_stack:
      task_id: delete_dynamodb_stack
      operator: airflow.providers.amazon.aws.operators.cloud_formation.CloudFormationDeleteStackOperator
      trigger_rule: all_done
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - wait_for_value
    wait_for_dynamodb_delete:
      task_id: wait_for_dynamodb_delete
      operator: airflow.providers.amazon.aws.sensors.cloud_formation.CloudFormationDeleteStackSensor
      stack_name: '{{ params.stack_name }}'
      dependencies:
      - delete_dynamodb_stack
  description: MWAA Serverless Dynamodb example DAG
  params:
    stack_name: mwaa-test-dynamodb-stack
